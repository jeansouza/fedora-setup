# Deploy to: /etc/modprobe.d/i915.conf

# Disable Display C-states to prevent DisplayPort link retraining on wake.
# Without this, the i915 display engine enters a low-power state that drops
# the DP MST link to the dock. When the LG monitor wakes from its own energy
# saving mode, repeated ACT handshake failures (3s each) cause a ~90-second
# delay before the lock screen appears.
options i915 enable_dc=0
